# ============================================================================
# ~/.tmux.conf
# ============================================================================

# ----------------------------------------------------------------------------
# General
# ----------------------------------------------------------------------------

# Use C-a as prefix (easier to reach than C-b)
set-option -g prefix C-a
unbind C-b
bind C-a send-prefix              # press C-a twice to send a literal C-a

# Faster command sequences (no delay after ESC)
set -sg escape-time 10

# Larger scrollback buffer
set -g history-limit 100000

# Start window/pane numbering at 1, renumber when one closes
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Enable mouse (scroll, click panes, drag to resize)
set -g mouse on

# Don't rename windows automatically once I've named them
set -g allow-rename off

# Bigger message display time
set -g display-time 2000
set -g display-panes-time 2000

# Focus events forwarded to apps (vim/nvim autoread, etc.)
set -g focus-events on

# ----------------------------------------------------------------------------
# Terminal / colors / modern keys
# ----------------------------------------------------------------------------

# True color + italics support. Set $TERM inside tmux to tmux-256color and
# advertise RGB + extended capabilities to the outer terminal.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",xterm*:RGB"

# Shift-Enter / Ctrl-Enter for Claude Code, pi, Neovim, Helix.
set -g extended-keys on
set -g extended-keys-format xterm
set -as terminal-features 'xterm*:extkeys'

# Pass through OSC 52 clipboard escape sequences from inner programs
set -g set-clipboard on

# ----------------------------------------------------------------------------
# Reload
# ----------------------------------------------------------------------------

unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ----------------------------------------------------------------------------
# Splits and windows
# ----------------------------------------------------------------------------

# More intuitive split bindings; open new panes/windows in current path
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"

# ----------------------------------------------------------------------------
# Vim-like navigation
# ----------------------------------------------------------------------------

setw -g mode-keys vi

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (repeatable: hold the second key)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vim-style copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# ----------------------------------------------------------------------------
# Colors (Solarized 256)
# ----------------------------------------------------------------------------

# Status bar
set-option -g status-style fg=colour136,bg=colour235          # yellow on base02
set-option -g status-interval 5
set-option -g status-left-length 40
set-option -g status-right-length 80
set-option -g status-left  "#[fg=colour64]#S "                # session name
set-option -g status-right "#[fg=colour244]%Y-%m-%d #[fg=colour166]%H:%M "

# Window titles
set-window-option -g window-status-style          fg=colour244,bg=default   # base0
set-window-option -g window-status-current-style  fg=colour166,bg=default   # orange

# Pane borders
set-option -g pane-border-style        fg=colour235            # base02
set-option -g pane-active-border-style fg=colour240            # base01
set-option -g pane-border-format "#{pane_index} #{pane_title}"
set-option -g pane-border-status top

# Messages
set-option -g message-style fg=colour166,bg=colour235          # orange on base02

# Pane number overlay (prefix q)
set-option -g display-panes-active-colour colour33             # blue
set-option -g display-panes-colour        colour166            # orange

# Clock mode
set-window-option -g clock-mode-colour colour64                # green

# Bell
set-window-option -g window-status-bell-style fg=colour235,bg=colour160  # base02 on red

# ----------------------------------------------------------------------------
# Plugins (tpm)
# ----------------------------------------------------------------------------
# Install: <prefix> + I    Update: <prefix> + U    Remove: <prefix> + alt-u

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'      # sane defaults
set -g @plugin 'tmux-plugins/tmux-resurrect'     # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'     # auto save/restore
set -g @plugin 'tmux-plugins/tmux-yank'          # better clipboard integration
set -g @plugin 'christoomey/vim-tmux-navigator'  # seamless vim <-> tmux pane nav

# tmux-resurrect: also restore pane contents and common programs
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum: auto-save every 15 min, auto-restore on tmux start
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Initialize tpm (keep at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
